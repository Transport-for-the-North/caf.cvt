# Climate Vulnerability Tool Config File

# Model Section Switches
switches:
  # If running from scratch using only the raw input files these switches should all be true
  run_data_cleaning: false
  run_functional_rules: false
  run_layering: true

  # Infrastructure switches 
  all_roads: false
  noham_roads: true

  passenger_rail: true
  freight_rail: true

  airports: false
  bus_stops: false
  petrol_stations: false
  charging_sites: false
  national_cycle_network: false
  train_stations: false
  tram_stations: false
  rapid_transport_stations: false
  ferry_terminals: false
  bus_coach_stations: false
  tram_network: true
  rapid_transport_network: false

  # Hazard switches
  extreme_weather: true
  flooding: true
  ground_stability: false
  coastal_erosion: false

  

  # True if the raw flood data from Defra data services needs to be extracted from the zip files (this is time consuming)
  flood_zip_extract: false
  # True if the flood grid needs to be created before upscaling the flood data to this grid
  create_flood_grid: false

  # True if overlaying the flood data directly to retain maximum spatial detail (this takes several months), 
  # False if upscaling flood data to 1km grid
  compute_flood_overlay: false
  # True if using the direct flood overlay to calculate flood risk
  flood_overlay_direct: true
  # True if the flood tiles need to be created before using these in the direct flood overlay
  create_flood_tiles: false

  # True if the raw NoHAM h5 files need to be extracted from zip file
  noham_zip_extract: false



parameters:
  # Name of Sub-National Transport Body to run the tool for (this must exactly match the name in the boundary data)
  # Should be empty if running for CA rather than STB
  # Options include: 'Transport for the North' (model only works for North of England at present)
  stb:

  # Name of Combined Authority to run the tool for (this must exactly match the name in the boundary data)
  # Should be empty if running for STB rather than CA
  # Options include: 'Greater Manchester', 'South Yorkshire', 'West Yorkshire', 'Liverpool City Region', 'Tees Valley', 
  #                  'York and North Yorkshire', 'North East', 'Hull and East Yorkshire', 'Lancashire'
  ca: South Yorkshire


###### FILE PATHS ######

paths:
  root: D:/Climate Vulnerability Tool/Localisation/v1/Data # This is the root of any outputs of the model
  raw_input: D:/Climate Vulnerability Tool/Data/raw inputs

other_input:
  # If using a specific boundary file rather than from OpenGeographyPortal, provide the path here, otherwise leave empty
  boundary_path:
  stb_path: D:/Climate Vulnerability Tool/Data/raw inputs/Other/STB_2023/STB_Boundary_2023.shp
  ca_path: D:/Climate Vulnerability Tool/Data/raw inputs/Other/Combined_Authorities_December_2025_Boundaries_EN_BFC.gpkg

